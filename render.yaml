services:
  - type: web
    name: interviewace-backend
    runtime: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: interviewace-db
          property: connectionString

databases:
  - name: interviewace-db
    engine: postgres
    version: 15
    plan: free
